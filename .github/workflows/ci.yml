name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download spec files
        run: make setup

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test -- --nocapture

      - name: Clippy (zero warnings)
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check

      - name: Zero unsafe check
        run: |
          COUNT=$(grep -rn "unsafe" src/ | grep -v "//.*unsafe" | wc -l)
          if [ "$COUNT" -ne 0 ]; then
            echo "Found unsafe blocks!"
            exit 1
          fi

      - name: Check README compliance matches test
        run: |
          COMPLIANCE=$(cargo test --test commonmark -- --nocapture | grep "CommonMark spec:" | sed -n 's/.*(\(.*\)%)/\1/p')
          README_COMPLIANCE=$(grep "CommonMark spec compliance" README.md | sed -n 's/.*| \(.*\)% |/\1/p')
          if [ "$COMPLIANCE" != "$README_COMPLIANCE" ]; then
            echo "Compliance mismatch! README says $README_COMPLIANCE% but test says $COMPLIANCE%"
            exit 1
          fi

      - name: Dogfood README
        run: |
          cat README.md | cargo run --release > /dev/null

      - name: Binary size
        run: ls -lh target/release/marked-rs
